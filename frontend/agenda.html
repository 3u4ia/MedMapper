<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med Mapper - Weekly Agenda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <img src="logo.jpg" alt="Logo" class="logo">
    </header>

    <main class="container">
        <div class="content-box">
            <h2>Your Weekly Agenda</h2>
            <p>Based on your uploaded medical documents.</p>
        </div>

        <section class="agenda-section">
            <div class="day-card">
                <h3>Monday</h3>
                <p id="monday">No data available.</p>
            </div>
            <div class="day-card">
                <h3>Tuesday</h3>
                <p id="tuesday">No data available.</p>
            </div>
            <div class="day-card">
                <h3>Wednesday</h3>
                <p id="wednesday">No data available.</p>
            </div>
            <div class="day-card">
                <h3>Thursday</h3>
                <p id="thursday">No data available.</p>
            </div>
            <div class="day-card">
                <h3>Friday</h3>
                <p id="friday">No data available.</p>
            </div>
            <div class="day-card">
                <h3>Saturday</h3>
                <p id="saturday">No data available.</p>
            </div>
            <div class="day-card">
                <h3>Sunday</h3>
                <p id="sunday">No data available.</p>
            </div>
        </section>

        <div class="action-area" style="margin-top: 20px;">
            <a href="index.html" class="btn" style="text-align: center; text-decoration: none; line-height: 40px;">Back to Upload</a>
        </div>
    </main>

</body>
</html>
