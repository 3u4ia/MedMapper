<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med Mapper - Upload</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <img src="logo.jpg" alt="Logo" class="logo">
    </header>

    <main class="container">
        <div class="content-box">
            <p>Welcome to Med Mapper! Upload your medication instructions below to generate your weekly schedule.</p>
        </div>

        <div id="image-preview" class="preview-container"></div>

        <div class="action-area">
            <button class="btn" id="add-image-btn">Add Image</button>
            <input type="file" id="file-input" accept="image/*" multiple style="display: none;">
        </div>

        <div class="action-area">
            <button class="btn" id="generate-agenda-btn">Generate Agenda</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
